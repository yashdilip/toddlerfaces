<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Toddlerfaces.com is available for purchase. Contact marveldev.io@gmail.com for inquiries.">
    <title>toddlerfaces.com is for sale</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f7f3ec;
            --panel: #ffffff;
            --text: #1f2933;
            --muted: #64748b;
            --accent: #cf6f4a;
            --accent-dark: #9f4d31;
            --border: #eadfce;
            --shadow: 0 24px 70px rgba(68, 48, 31, 0.18);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --panel: #1f2937;
                --text: #f8fafc;
                --muted: #cbd5e1;
                --accent: #f3a071;
                --accent-dark: #ffc09e;
                --border: #374151;
                --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(207, 111, 74, 0.18), transparent 34rem),
                radial-gradient(circle at bottom right, rgba(64, 116, 160, 0.16), transparent 30rem),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100%, 640px);
            padding: 48px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: color-mix(in srgb, var(--panel) 94%, transparent);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 18px;
            color: var(--accent-dark);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.1rem, 7vw, 4.25rem);
            line-height: 1.02;
            letter-spacing: 0;
            word-break: break-word;
        }

        .summary {
            max-width: 34rem;
            margin: 22px auto 0;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.7;
        }

        .contact {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 32px;
            padding: 14px 22px;
            border-radius: 999px;
            background: var(--accent);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
        }

        .contact:hover {
            background: var(--accent-dark);
        }

        .note {
            margin: 24px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        @media (max-width: 560px) {
            main {
                padding: 34px 24px;
                border-radius: 14px;
            }

            .contact {
                width: 100%;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">Domain available</p>
        <h1>toddlerfaces.com</h1>
        <p class="summary">
            This domain is available for purchase. Serious inquiries and offers are welcome.
        </p>
        <a class="contact" href="mailto:marveldev.io@gmail.com?subject=Inquiry%20about%20toddlerfaces.com">
            Contact marveldev.io@gmail.com
        </a>
        <p class="note">
            This is a static GitHub Pages site, so inquiries are handled by email only.
        </p>
    </main>
</body>
</html>
